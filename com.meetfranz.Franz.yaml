app-id: com.meetfranz.Franz
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: franz
separate-locales: false
rename-desktop-file: franz.desktop
rename-icon: franz
finish-args:
  - --socket=x11
  - --share=ipc
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --filesystem=xdg-download
  - --filesystem=xdg-pictures:ro
  - --filesystem=xdg-videos:ro
  - --filesystem=xdg-documents:ro
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
modules:
  - name: franz-desktop
    buildsystem: simple
    build-commands:
      - ar x Franz_*.deb
      - rm -f Franz_*.deb
      - tar xf data.tar.xz
      - rm -f control.tar.xz data.tar.xz debian-binary
      - cp -r usr/* opt/* /app
      - chmod -R a-s,go+rX,go-w /app/Franz
      - rm -rf /app/share/icons/hicolor/1024x1024
      - desktop-file-edit --set-key=Exec --set-value='franz %U' /app/share/applications/franz.desktop
      - install franz.sh /app/bin/franz
      - install -Dm644 com.meetfranz.Franz.metainfo.xml /app/share/metainfo/com.meetfranz.Franz.metainfo.xml
    sources:
      - type: file
        only-arches:
          - x86_64
        url: https://github.com/meetfranz/franz-6/releases/download/v6.3.1/Franz_amd64.deb
        sha256: 27c081d0610ad6d41c014316397a5a769b64c47e18013c364df431a18979f0c9
      - type: script
        dest-filename: franz.sh
        commands:
          - export TMPDIR="$XDG_RUNTIME_DIR/app/$FLATPAK_ID"
          - exec zypak-wrapper /app/Franz/franz "$@"
      - type: file
        path: com.meetfranz.Franz.metainfo.xml
